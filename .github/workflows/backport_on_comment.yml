name: backport_on_command

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  backport_on_command:
    # Run when a comment starting with `/backport` is created by someone other
    # than the https://github.com/backport-action bot user (user id: 97796249).
    if: >
      (
        github.repository_owner == 'tarantool' &&
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.id != 97796249 &&
        startsWith(github.event.comment.body, '/backport')
      )

    runs-on: ubuntu-20.04-self-hosted

    timeout-minutes: 60

    container:
      image: docker.io/tarantool/testing:ubuntu-focal
      # Mount /dev to the container to be able to mount a disk image inside it
      # for successful run of the .github/actions/environment action.
      volumes:
        - /dev:/dev

    steps:
      - name: Prepare checkout
        uses: tarantool/actions/prepare-checkout@master
      - uses: actions/checkout@v4
      # Remove '/backport ' from the beginning of the original comment body and
      # pass it to further steps.
      - id: vars
        run: |
          target_branches=$(echo ${{github.event.comment.body}} | cut -c 11-)
          echo "::set-output name=target_branches::$target_branches"
      - name: Create backport pull requests
        uses: korthout/backport-action@v3
        with:
          branch_name: backport/${target_branch}/${pull_number}
          target_branches: ${{ steps.vars.outputs.target_branches }}
          pull_description: |
            *(This PR is a backport of #${pull_number} to `${target_branch}`.)*

            ----

            ${pull_description}

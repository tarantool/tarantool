name: debug_catch_flaky

on:
  pull_request:
    paths:
      - 'test/*/*.lua'
      - 'test/unit/*.c*'

concurrency:
  # Update of a developer branch cancels the previously scheduled workflow
  # run for this branch. However, the 'master' branch, release branch, and
  # tag workflow runs are never canceled.
  #
  # We use a trick here: define the concurrency group as 'workflow run ID' +
  # 'workflow run attempt' because it is a unique combination for any run.
  # So it effectively discards grouping.
  #
  # Important: we cannot use `github.sha` as a unique identifier because
  # pushing a tag may cancel a run that works on a branch push event.
  group: ${{ (
    github.ref == 'refs/heads/master' ||
    startsWith(github.ref, 'refs/heads/release/') ||
    startsWith(github.ref, 'refs/tags/')) &&
    format('{0}-{1}', github.run_id, github.run_attempt) ||
    format('{0}-{1}-debug-catch-flaky', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  collect_tests:
    # Run on pull request if the 'notest' or 'noflaky' label is not set.
    if: github.repository_owner == 'tarantool' &&
        github.event_name == 'pull_request' &&
        !contains(github.event.pull_request.labels.*.name, 'noflaky') &&
        !contains(github.event.pull_request.labels.*.name, 'notest')

    runs-on: ubuntu-20.04-self-hosted

    timeout-minutes: 10

    outputs:
      shard_count: ${{ steps.collect.outputs.shard_count }}
      shards: ${{ steps.collect.outputs.shards }}
      test_count: ${{ steps.collect.outputs.test_count }}
      tests: ${{ steps.collect.outputs.tests }}

    steps:
      - name: Prepare checkout
        uses: tarantool/actions/prepare-checkout@master
      - name: Sources checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: tarantool/tarantool
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Collect changed tests
        id: collect
        env:
          COMMIT_RANGE: HEAD~${{ github.event.pull_request.commits }}..HEAD
        run: |
          tests=$(cd test && git diff --relative=test --name-only \
            --diff-filter=AMRT "${COMMIT_RANGE}" -- './*/*test.lua' \
            './unit/*.c*' | sed 's/\.\(c\|cpp\|cc\)$//' | sort -u)
          if [ -z "${tests}" ]; then
            test_count=0
          else
            test_count=$(printf '%s\n' "${tests}" | wc -l | tr -d ' ')
          fi
          if [ "${test_count}" -lt 4 ]; then
            shard_count=${test_count}
          else
            shard_count=4
          fi
          case "${shard_count}" in
            0) shards='[]' ;;
            1) shards='[1]' ;;
            2) shards='[1, 2]' ;;
            3) shards='[1, 2, 3]' ;;
            4) shards='[1, 2, 3, 4]' ;;
          esac
          {
            echo 'tests<<EOF'
            echo "${tests}"
            echo 'EOF'
            echo "test_count=${test_count}"
            echo "shard_count=${shard_count}"
            echo "shards=${shards}"
          } >> "${GITHUB_OUTPUT}"

  debug_catch_flaky:
    name: debug_catch_flaky (shard ${{ matrix.shard }})
    needs: collect_tests
    if: needs.collect_tests.outputs.test_count != '0'

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        shard: ${{ fromJSON(needs.collect_tests.outputs.shards) }}

    runs-on: ubuntu-20.04-self-hosted

    timeout-minutes: 60

    container:
      image: docker.io/tarantool/testing:ubuntu-focal
      # Mount /dev to the container to be able to mount a disk image inside it
      # for successful run of the .github/actions/environment action.
      volumes:
        - /dev:/dev
      # Our testing expects that the init process (PID 1) will
      # reap orphan processes. At least the following test leans
      # on it: app-tap/gh-4983-tnt-e-assert-false-hangs.test.lua.
      # Add extra privileges to the container for successful run
      # of the .github/actions/environment action.
      options: '--init --privileged'

    steps:
      - name: Prepare checkout
        uses: tarantool/actions/prepare-checkout@master
      - name: Sources checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          repository: tarantool/tarantool
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set environment
        uses: ./.github/actions/environment

      - name: Install deps
        uses: ./.github/actions/install-deps-debian

      - name: Run the changed tests
        env:
          ALL_TESTS: ${{ needs.collect_tests.outputs.tests }}
          SHARD: ${{ matrix.shard }}
          SHARD_COUNT: ${{ needs.collect_tests.outputs.shard_count }}
        run: |
          selected_tests=$(printf '%s\n' "${ALL_TESTS}" | awk \
            -v shard="${SHARD}" -v count="${SHARD_COUNT}" \
            '(NR - 1) % count == shard - 1' | paste -sd ' ' -)
          make -f .test.mk test-debug-flaky \
            FLAKY_TESTS="${selected_tests}"

      - name: Collect artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-logs-${{ matrix.shard }}
          retention-days: 21
          path: ${{ env.VARDIR }}/artifacts

      - name: Upload artifacts to S3
        uses: ./.github/actions/s3-upload-artifact
        if: ( success() || failure() ) && ( github.ref == 'refs/heads/master' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/tags/') )
        with:
          job-name: ${{ github.job }}
          access-key-id: ${{ secrets.MULTIVAC_S3_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.MULTIVAC_S3_SECRET_ACCESS_KEY }}
          source: ${{ env.VARDIR }}/artifacts
